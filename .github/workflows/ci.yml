name: Python GitOps Helm CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Python Code
      uses: actions/checkout@v4

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Downcase repo name
      run: |
        echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ghcr.io/${{ env.REPO_LC }}:latest
          ghcr.io/${{ env.REPO_LC }}:${{ github.sha }}

    # 跨專案下載 K8s 配置專案
    - name: Checkout K8s Manifest Repo
      uses: actions/checkout@v4
      with:
        repository: '${{ github.actor }}/k8s-gitops-manifests' 
        token: ${{ secrets.G_TOKEN }}
        path: k8s-manifests

    # 【重要改動】這次不用 sed 去改死板板的 app.yaml 了！
    # 我們改用專門處理 YAML 的神級小工具「yq」，優雅且精準地修改 values.yaml 裡面的 tag 欄位
    - name: Update Helm Chart Values
      run: |
        cd k8s-manifests/my-python-chart
        
        # 1. 精準修改 values.yaml 裡 image.tag 的值，改成當前最新 Commit 的雜湊值
        # 為了確保系統內建有 yq，我們這裡直接用一行 python 指令來精準替換它
        python3 -c "
        import yaml
        with open('values.yaml', 'r') as f:
            data = yaml.safe_load(f)
        data['image']['tag'] = '${{ github.sha }}'
        with open('values.yaml', 'w') as f:
            yaml.safe_dump(data, f)
        "
        
        # 2. 檢查修改後的 values.yaml 成果
        cat values.yaml

    # 把修改後的 values.yaml 送回配置專案
    - name: Commit and Push Changes back to K8s Repo
      run: |
        cd k8s-manifests
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        # 這次我們只追蹤並提交 values.yaml 的異動即可
        git add my-python-chart/values.yaml
        git commit -m "🤖 Helm GitOps 自動升級：發布全新 Image 版本 Tag [${{ github.sha }}]"
        git push origin main
